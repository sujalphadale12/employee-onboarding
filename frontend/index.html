<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Employee Onboarding</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Smart Employee Onboarding</h1>
    <p>Employee Registration Portal</p>

    <form id="employeeForm">

        <label>Employee Name</label>
        <input
            type="text"
            id="name"
            placeholder="Enter Full Name"
            required>

        <label>Email</label>
        <input
            type="email"
            id="email"
            placeholder="Enter Email"
            required>

        <label>Department</label>

        <select id="department">

            <option value="">Select Department</option>

            <option>Cloud</option>

            <option>HR</option>

            <option>Finance</option>

            <option>Sales</option>

            <option>Marketing</option>

            <option>IT</option>

        </select>

        <label>Role</label>

        <input
            type="text"
            id="role"
            placeholder="AWS Engineer">

        <label>Joining Date</label>

        <input
            type="date"
            id="joining_date">

        <button type="submit">

            Register Employee

        </button>

    </form>

    <div id="message"></div>

</div>

<script src="script.js"></script>

</body>
</html>
