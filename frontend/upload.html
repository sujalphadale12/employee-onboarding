<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Employee Document</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Upload Employee Document</h1>

    <form id="uploadForm">

        <label>Employee ID</label>
        <input
            type="text"
            id="employee_id"
            placeholder="EMP-XXXXXXXX"
            required>

        <label>Select Document (PDF)</label>
        <input
            type="file"
            id="document"
            accept=".pdf"
            required>

        <button type="submit">
            Upload Document
        </button>

    </form>

    <div id="message"></div>

</div>

<script src="upload.js"></script>

</body>
</html>
